<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FerretFinds</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        #qr-reader video { object-fit: cover !important; border-radius: 12px; }
        
        /* Premium Glow Effect for True Pennies */
        .penny-glow {
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.2);
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { border-color: rgba(251, 191, 36, 0.3); }
            100% { border-color: rgba(251, 191, 36, 0.7); }
        }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto min-h-screen flex flex-col justify-between">

    <header class="space-y-4">
        <div class="flex justify-between items-center bg-slate-900/60 border border-slate-850 p-4 rounded-2xl shadow-xl">
            <div class="flex items-center gap-2.5">
                <span class="text-3xl">🦦</span>
                <div>
                    <h1 class="text-base font-black tracking-tight text-white">FerretFinds</h1>
                    <p class="text-xxs text-slate-400 font-medium">Automated Penny Hunter</p>
                </div>
            </div>
            
            <div class="flex flex-col items-end gap-1.5">
                <div id="syncBadge" class="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-xl">
                    <span id="syncSpinner" class="hidden text-emerald-400 animate-spin text-xs"><i class="fa-solid fa-circle-notch"></i></span>
                    <span id="syncIcon" class="text-emerald-400 text-xs"><i class="fa-solid fa-cloud-arrow-down"></i></span>
                    <div>
                        <div id="syncText" class="text-xxs font-bold text-slate-400 uppercase tracking-wider leading-none">Next Sync</div>
                        <div id="countdownTimer" class="text-xs font-black font-mono text-emerald-400 mt-0.5 leading-none">59m 59s</div>
                    </div>
                </div>
                <button onclick="triggerManualBackendSync(this)" class="bg-slate-800 hover:bg-slate-750 text-slate-300 text-[10px] font-bold px-2.5 py-1 rounded-md border border-slate-700 transition flex items-center gap-1 shadow cursor-pointer">
                    <i class="fa-solid fa-rotate mr-0.5 text-slate-400"></i> Force Sync Now
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 bg-slate-950 p-1.5 border border-slate-850 rounded-xl">
            <button onclick="switchBrand('DG')" id="tab-DG" class="py-2 text-xs font-bold rounded-lg transition text-amber-400 bg-amber-500/10 border border-amber-500/20">
                🟡 Dollar General
            </button>
            <button onclick="switchBrand('DT')" id="tab-DT" class="py-2 text-xs font-bold rounded-lg transition text-slate-400 hover:text-white">
                🟢 Dollar Tree
            </button>
        </div>

        <div class="flex gap-2 items-center bg-slate-900/40 border border-slate-850 rounded-xl p-2.5">
            <span class="text-slate-500 text-xs pl-1"><i class="fa-solid fa-location-dot"></i></span>
            <input type="text" id="storeZipInput" placeholder="Enter zip code..." max="5"
                class="bg-transparent text-sm text-white focus:outline-none placeholder-slate-600 font-mono w-28">
            <button onclick="updateLocationZip()" class="ml-auto bg-slate-800 hover:bg-slate-750 text-white text-xxs font-bold px-3 py-1.5 rounded-md border border-slate-700 transition">
                Set Location
            </button>
        </div>

        <div class="flex gap-2 text-xs font-medium border-b border-slate-850 pb-2">
            <button onclick="setFilter('all')" id="filter-all" class="px-3 py-1 rounded-full bg-slate-800 text-white font-bold">All</button>
            <button onclick="setFilter('penny')" id="filter-penny" class="px-3 py-1 rounded-full text-slate-400 hover:text-white">Just Pennies</button>
            <button onclick="setFilter('markdown')" id="filter-markdown" class="px-3 py-1 rounded-full text-slate-400 hover:text-white">Markdowns</button>
        </div>
    </header>

    <main class="my-4 flex-grow">
        <div id="scannerContainer" class="hidden mb-4 bg-slate-950 border border-slate-850 rounded-2xl p-3 shadow-2xl relative">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-xs font-bold uppercase tracking-wider text-emerald-400 flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span> Live Lens Scanner
                </span>
                <button onclick="toggleCameraScanner()" class="text-slate-400 hover:text-white text-sm px-2 py-0.5 rounded bg-slate-900 border border-slate-800">
                    <i class="fa-solid fa-xmark"></i> Close
                </button>
            </div>
            <div id="qr-reader" class="w-full overflow-hidden border border-slate-800 rounded-xl bg-black"></div>
            <p class="text-[10px] text-slate-500 font-medium text-center mt-2 font-sans">Center the product's barcode label inside the lens frame</p>
        </div>

        <section id="dealSection" class="space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400"><i class="fa-solid fa-barcode mr-1"></i> Active Inventory Catalog</h3>
                <span id="itemCount" class="text-xxs bg-slate-900 text-slate-400 px-2 py-0.5 rounded-md font-mono font-bold border border-slate-800">0 Items Loaded</span>
            </div>
            
            <div class="flex gap-2 relative">
                <div class="relative flex-grow">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </span>
                    <input type="text" id="dealSearchInput" onkeyup="filterLiveCards()" placeholder="Search names, UPC codes, or tags..." 
                        class="w-full bg-slate-950 border border-slate-850 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 text-white placeholder-slate-500 transition font-sans">
                </div>
                <button onclick="toggleCameraScanner()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold px-4 rounded-xl flex items-center justify-center transition shadow-md shadow-emerald-500/10">
                    <i class="fa-solid fa-camera text-base"></i>
                </button>
            </div>

            <div id="pennyList" class="space-y-3">
                <div class="bg-slate-950 border border-slate-850 rounded-2xl p-8 text-center text-slate-500 text-sm">
                    <i class="fa-solid fa-circle-notch animate-spin mb-2 text-emerald-400 text-lg block"></i>
                    Establishing gateway to inventory sheets...
                </div>
            </div>
        </section>
    </main>

    <footer class="text-center pt-4 border-t border-t-slate-900">
        <p class="text-xxs text-slate-600 font-mono tracking-wide">&copy; 2026 CAPYBARA SCIENCE LABS &bull; DEALS REFRESHED DAILY</p>
    </footer>

    <script>
        let loadedCloudItems = [];
        let currentActiveBrand = 'DG';
        let currentFilter = 'all';
        let html5QrcodeScanner = null;
        let totalSecondsLeft = 3600; 

        window.addEventListener('DOMContentLoaded', () => {
            initializeStoredZipCode();
            startCountdownTimer();
            fetchLatestDealsFeed();
        });

        // SUCCESS BADGE SYSTEM ENGINE
        function generatePriceBadge(clearancePrice, percentOff) {
            if (clearancePrice === 0.01) {
                return `
                    <span class="text-[10px] bg-amber-500 text-slate-950 font-black px-2 py-0.5 rounded flex items-center gap-1 uppercase tracking-wider animate-pulse">
                        <i class="fa-solid fa-star"></i> True Penny
                    </span>
                `;
            } else if (percentOff >= 90) {
                return `
                    <span class="text-[10px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 font-black px-2 py-0.5 rounded flex items-center gap-1 uppercase tracking-wider">
                        <i class="fa-solid fa-fire"></i> Steal Deal
                    </span>
                `;
            } else {
                return `
                    <span class="text-[10px] bg-sky-500/10 text-sky-400 border border-sky-500/20 font-bold px-2 py-0.5 rounded flex items-center gap-1 uppercase tracking-wider">
                        <i class="fa-solid fa-tag"></i> Clearance
                    </span>
                `;
            }
        }

        // 🔥 FIXED: Direct Static JSON Fetcher - No More CORS Errors!
        async function triggerManualBackendSync(buttonElement) {
            const originalContent = buttonElement.innerHTML;
            const syncIcon = document.getElementById("syncIcon");
            const syncSpinner = document.getElementById("syncSpinner");
            
            buttonElement.disabled = true;
            buttonElement.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin text-emerald-400 mr-1"></i> Syncing...`;
            
            if (syncIcon) syncIcon.classList.add("hidden");
            if (syncSpinner) syncSpinner.classList.remove("hidden");

            try {
                // Fetch direct from your local live-deals.json populated by GitHub
                await fetchLatestDealsFeed();
                totalSecondsLeft = 3600; // Reset local clock cycle
            } catch (error) {
                console.error("Data pipeline refresh exception:", error);
            } finally {
                buttonElement.disabled = false;
                buttonElement.innerHTML = originalContent;
                if (syncIcon) syncIcon.classList.remove("hidden");
                if (syncSpinner) syncSpinner.classList.add("hidden");
            }
        }

        function toggleCameraScanner() {
            const container = document.getElementById("scannerContainer");
            if (container.classList.contains("hidden")) {
                container.classList.remove("hidden");
                html5QrcodeScanner = new Html5Qrcode("qr-reader");
                const config = { fps: 15, qrbox: { width: 260, height: 140 }, aspectRatio: 1.777778 };
                html5QrcodeScanner.start({ facingMode: "environment" }, config, onBarcodeSuccess, onBarcodeFailure)
                .catch(err => {
                    alert("Camera access denied.");
                    container.classList.add("hidden");
                });
            } else {
                killCameraLens();
            }
        }

        function onBarcodeSuccess(decodedText) {
            document.getElementById('dealSearchInput').value = decodedText;
            killCameraLens();
            filterLiveCards();
            alert(`Scanned: ${decodedText}`);
        }

        function onBarcodeFailure() {}

        function killCameraLens() {
            const container = document.getElementById("scannerContainer");
            container.classList.add("hidden");
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner = null;
                    document.getElementById("qr-reader").innerHTML = "";
                });
            }
        }

        function initializeStoredZipCode() {
            const preservedZip = localStorage.getItem('ferret_finds_zip');
            if (preservedZip) document.getElementById("storeZipInput").value = preservedZip;
            else document.getElementById("storeZipInput").value = "46802";
        }

        function updateLocationZip() {
            const zipInput = document.getElementById("storeZipInput").value.trim();
            if (zipInput.length === 5 && !isNaN(zipInput)) {
                localStorage.setItem('ferret_finds_zip', zipInput);
                fetchLatestDealsFeed();
            }
        }

        function startCountdownTimer() {
            setInterval(() => {
                if (totalSecondsLeft <= 0) totalSecondsLeft = 3600;
                else totalSecondsLeft--;
                let min = Math.floor(totalSecondsLeft / 60);
                let sec = totalSecondsLeft % 60;
                document.getElementById("countdownTimer").innerText = `${min < 10 ? "0"+min : min}m ${sec < 10 ? "0"+sec : sec}s`;
            }, 1000);
        }

        async function fetchLatestDealsFeed() {
            try {
                const response = await requestsFetchShim("./live-deals.json");
                loadedCloudItems = await response.json();
            } catch (error) {
                loadedCloudItems = [
                    {"store": "DG", "name": "Ghirardelli Chocolate Hearts Valentine Bag", "upc": "747599436239", "sku": "32014588", "added": "Tuesday Penny", "originalPrice": 4.50, "clearancePrice": 0.01, "isPenny": true, "dept": "Seasonal / Holiday Row"},
                    {"store": "DG", "name": "Gain Liquid Laundry Detergent Original 46oz", "upc": "037000761421", "sku": "11405973", "added": "Markdown Drop", "originalPrice": 7.50, "clearancePrice": 2.25, "isPenny": false, "dept": "Cleaning & Household"},
                    {"store": "DG", "name": "Colgate Optic White Toothpaste 4.2oz", "upc": "035000456123", "sku": "95420136", "added": "Tuesday Penny", "originalPrice": 3.99, "clearancePrice": 0.01, "isPenny": true, "dept": "Health & Beauty Care"},
                    {"store": "DT", "name": "Haribo Goldbears Share Size Bag 8oz", "upc": "042234001211", "sku": "54810294", "added": "Markdown Drop", "originalPrice": 2.50, "clearancePrice": 0.20, "isPenny": false, "dept": "Candy & Snacks Wall"}
                ];
            }
            renderDeals();
        }

        function renderDeals() {
            const pennyListContainer = document.getElementById("pennyList");
            let matches = loadedCloudItems.filter(item => item.store === currentActiveBrand);

            if (currentFilter === 'penny') matches = matches.filter(item => item.isPenny);
            else if (currentFilter === 'markdown') matches = matches.filter(item => !item.isPenny);

            document.getElementById("itemCount").innerText = `${matches.length} Items Listed`;

            pennyListContainer.innerHTML = matches.map(item => {
                const percentageOff = Math.round(((item.originalPrice - item.clearancePrice) / item.originalPrice) * 100);
                const displaySku = item.sku ? item.sku : "N/A";
                const floorDepartment = item.dept ? item.dept : "General Merchandise";
                
                let copyString = item.store === "DG" ? item.sku : `${item.name} ${item.upc}`;
                let storeHomeUrl = item.store === "DG" ? "https://www.dollargeneral.com" : "https://www.dollartree.com";
                let googleLookupUrl = `https://www.google.com/search?tbm=shop&q=${encodeURIComponent(item.store === "DG" ? 'Dollar General' : 'Dollar Tree')} ${encodeURIComponent(item.name)} ${item.upc}`;
                
                const visualSuccessBadge = generatePriceBadge(item.clearancePrice, percentageOff);
                const isTruePennyCard = item.clearancePrice === 0.01;

                return `
                    <div class="deal-card bg-slate-950 border ${isTruePennyCard ? 'penny-glow' : 'border-slate-850'} rounded-2xl p-4 flex flex-col justify-between gap-3 shadow-md transition duration-150">
                        <div>
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-xs font-mono font-bold text-slate-500">${item.added}</span>
                                <div class="flex items-center gap-1.5">
                                    <span class="text-xs bg-slate-900 border border-slate-800 text-slate-400 font-bold px-2 py-0.5 rounded font-mono">${percentageOff}% OFF</span>
                                    ${visualSuccessBadge}
                                </div>
                            </div>
                            
                            <h4 class="deal-name font-bold text-slate-100 text-sm leading-snug mb-1">
                                <button onclick="handleSmartCopy(this, '${escapeHtml(copyString)}', '${storeHomeUrl}')" class="text-left hover:text-emerald-400 transition duration-100 flex items-start gap-1 w-full group text-slate-100 bg-transparent border-0 p-0 cursor-pointer">
                                    <span class="group-hover:underline">${item.name}</span>
                                    <i class="fa-regular fa-copy text-[10px] text-slate-500 opacity-60 mt-1 ml-1 group-hover:text-emerald-400"></i>
                                </button>
                            </h4>

                            <div class="mb-2.5">
                                <span class="deal-dept bg-slate-900 border border-slate-800 text-slate-400 text-[10px] font-bold px-2 py-0.5 rounded-md inline-flex items-center gap-1">
                                    <i class="fa-solid fa-layer-group text-[9px] text-slate-500"></i> ${floorDepartment}
                                </span>
                            </div>
                            
                            <div class="flex items-baseline gap-2 mb-1">
                                <span class="text-xs text-slate-500 line-through font-mono">Reg: $${item.originalPrice.toFixed(2)}</span>
                                <span class="text-base font-black ${isTruePennyCard ? 'text-amber-400' : 'text-emerald-400'} font-mono">Now: $${item.clearancePrice.toFixed(2)}</span>
                            </div>
                        </div>

                        <div class="space-y-2 bg-slate-900 border border-slate-850 rounded-xl p-2.5">
                            <div class="flex items-center justify-between gap-2">
                                <span class="deal-upc font-mono text-xs text-slate-300 tracking-wider">
                                    <span class="text-slate-500 text-xxs font-sans uppercase font-bold mr-1">UPC:</span>${item.upc}
                                </span>
                                <button onclick="copyDataText('${item.upc}', this)" class="bg-slate-800 hover:bg-slate-750 text-emerald-400 text-xxs px-2.5 py-1 font-bold rounded flex items-center gap-1 transition cursor-pointer">
                                    <i class="fa-regular fa-copy"></i> <span>Copy</span>
                                </button>
                            </div>
                            <div class="flex items-center justify-between gap-2 pt-1.5 border-t border-slate-850">
                                <span class="deal-sku font-mono text-xs text-slate-300 tracking-wider">
                                    <span class="text-slate-500 text-xxs font-sans uppercase font-bold mr-1">SKU:</span>${displaySku}
                                </span>
                                <button onclick="copyDataText('${displaySku}', this)" class="bg-slate-800 hover:bg-slate-750 text-emerald-400 text-xxs px-2.5 py-1 font-bold rounded flex items-center gap-1 transition cursor-pointer">
                                    <i class="fa-regular fa-copy"></i> <span>Copy</span>
                                </button>
                            </div>
                            
                            <div class="pt-2 border-t border-slate-850/70">
                                <a href="${googleLookupUrl}" target="_blank" rel="noopener noreferrer" class="w-full text-center bg-slate-950 hover:bg-slate-850 border border-slate-800 hover:border-slate-700 text-slate-300 text-xxs font-bold py-1.5 rounded-lg flex items-center justify-center gap-1.5 transition no-underline">
                                    <i class="fa-solid fa-search text-slate-400"></i> Check Google Inventory / Images
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            filterLiveCards();
        }

        function handleSmartCopy(element, textToCopy, storeUrl) {
            navigator.clipboard.writeText(textToCopy);
            const textSpan = element.querySelector('span');
            const originalText = textSpan.innerText;
            textSpan.innerText = "Copied Search ID! Opening Store...";
            textSpan.classList.add("text-emerald-400");
            setTimeout(() => {
                textSpan.innerText = originalText;
                textSpan.classList.remove("text-emerald-400");
                window.open(storeUrl, '_blank');
            }, 900);
        }

        function filterLiveCards() {
            const query = document.getElementById('dealSearchInput').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.deal-card');
            cards.forEach(card => {
                const nameText = card.querySelector('.deal-name').innerText.toLowerCase();
                const upcText = card.querySelector('.deal-upc').innerText.toLowerCase();
                const skuText = card.querySelector('.deal-sku').innerText.toLowerCase();
                const deptText = card.querySelector('.deal-dept').innerText.toLowerCase();
                if (nameText.includes(query) || upcText.includes(query) || skuText.includes(query) || deptText.includes(query)) card.style.display = "";
                else card.style.display = "none";
            });
        }

        function copyDataText(textValue, buttonElement) {
            if (textValue === "N/A") return;
            navigator.clipboard.writeText(textValue);
            const originalStructure = buttonElement.innerHTML;
            buttonElement.innerHTML = `<i class="fa-solid fa-check text-emerald-400"></i> <span class="text-emerald-400">Copied</span>`;
            buttonElement.classList.add("bg-emerald-500/10");
            setTimeout(() => {
                buttonElement.innerHTML = originalStructure;
                buttonElement.classList.remove("bg-emerald-500/10");
            }, 1200);
        }

        function switchBrand(brandCode) {
            currentActiveBrand = brandCode;
            document.querySelectorAll("[id^='tab-']").forEach(el => el.className = "py-2 text-xs font-bold rounded-lg transition text-slate-400 hover:text-white");
            const activeTab = document.getElementById(`tab-${brandCode}`);
            if(brandCode === 'DG') activeTab.className = "py-2 text-xs font-bold rounded-lg transition text-amber-400 bg-amber-500/10 border border-amber-500/20";
            if(brandCode === 'DT') activeTab.className = "py-2 text-xs font-bold rounded-lg transition text-emerald-400 bg-emerald-500/10 border border-emerald-500/20";
            renderDeals();
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            document.querySelectorAll("[id^='filter-']").forEach(el => el.className = "px-3 py-1 rounded-full text-slate-400 hover:text-white");
            document.getElementById(`filter-${filterType}`).className = "px-3 py-1 rounded-full bg-slate-800 text-white font-bold";
            renderDeals();
        }

        function escapeHtml(str) { return str.replace(/'/g, "\\'").replace(/"/g, "&quot;"); }
        async function requestsFetchShim(target) { return fetch(target); }
    </script>
</body>
</html>
