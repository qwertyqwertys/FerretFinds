<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FerretFinds</title>
    <!-- Tailwind CSS for smooth design blocks -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto min-h-screen flex flex-col justify-between">

    <!-- TOP CONTROL NAVIGATION -->
    <header class="space-y-4">
        <div class="flex justify-between items-center bg-slate-900/60 border border-slate-850 p-4 rounded-2xl shadow-xl">
            <div class="flex items-center gap-2.5">
                <span class="text-3xl">🦫</span>
                <div>
                    <h1 class="text-base font-black tracking-tight text-white">FerretFinds</h1>
                    <p class="text-xxs text-slate-400 font-medium">Automated Penny Hunter</p>
                </div>
            </div>
            
            <!-- Dynamic Background Sync Timer Status -->
            <div id="syncBadge" class="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-xl">
                <span id="syncSpinner" class="hidden text-emerald-400 animate-spin text-xs"><i class="fa-solid fa-circle-notch"></i></span>
                <span id="syncIcon" class="text-emerald-400 text-xs"><i class="fa-solid fa-cloud-arrow-down"></i></span>
                <div>
                    <div id="syncText" class="text-xxs font-bold text-slate-400 uppercase tracking-wider leading-none">Next Sync</div>
                    <div id="countdownTimer" class="text-xs font-black font-mono text-emerald-400 mt-0.5 leading-none">59m 59s</div>
                </div>
            </div>
        </div>

        <!-- STORE SELECTOR TABS -->
        <div class="grid grid-cols-2 gap-2 bg-slate-950 p-1.5 border border-slate-850 rounded-xl">
            <button onclick="switchBrand('DG')" id="tab-DG" class="py-2 text-xs font-bold rounded-lg transition text-amber-400 bg-amber-500/10 border border-amber-500/20">
                🟡 Dollar General
            </button>
            <button onclick="switchBrand('DT')" id="tab-DT" class="py-2 text-xs font-bold rounded-lg transition text-slate-400 hover:text-white">
                🟢 Dollar Tree
            </button>
        </div>

        <!-- ZIP CODE / LOCATION TRACKER BAR -->
        <div class="flex gap-2 items-center bg-slate-900/40 border border-slate-850 rounded-xl p-2.5">
            <span class="text-slate-500 text-xs pl-1"><i class="fa-solid fa-location-dot"></i></span>
            <input type="text" id="storeZipInput" placeholder="Enter zip code..." value="46802" max="5"
                class="bg-transparent text-sm text-white focus:outline-none placeholder-slate-600 font-mono w-28">
            <button onclick="updateLocationZip()" class="ml-auto bg-slate-800 hover:bg-slate-750 text-white text-xxs font-bold px-3 py-1.5 rounded-md border border-slate-700 transition">
                Set Location
            </button>
        </div>

        <!-- DEALS FILTERS -->
        <div class="flex gap-2 text-xs font-medium border-b border-slate-850 pb-2">
            <button onclick="setFilter('all')" id="filter-all" class="px-3 py-1 rounded-full bg-slate-800 text-white font-bold">All</button>
            <button onclick="setFilter('penny')" id="filter-penny" class="px-3 py-1 rounded-full text-slate-400 hover:text-white">Just Pennies</button>
            <button onclick="setFilter('markdown')" id="filter-markdown" class="px-3 py-1 rounded-full text-slate-400 hover:text-white">Markdowns</button>
        </div>
    </header>

    <!-- LIVE DATABASE FEED DISPLAY -->
    <main class="my-4 flex-grow">
        <section id="dealSection" class="space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400"><i class="fa-solid fa-barcode mr-1"></i> 3. Active Inventory Catalog</h3>
                <span id="itemCount" class="text-xxs bg-slate-900 text-slate-400 px-2 py-0.5 rounded-md font-mono font-bold border border-slate-800">0 Items Loaded</span>
            </div>
            
            <!-- LIVE SEARCH AND BARCODE SCANNER CAPTURE FIELD -->
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-500">
                    <i class="fa-solid fa-magnifying-glass text-xs"></i>
                </span>
                <input type="text" id="dealSearchInput" onkeyup="filterLiveCards()" placeholder="Search items or scan UPC barcode..." 
                    class="w-full bg-slate-950 border border-slate-850 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 text-white placeholder-slate-500 transition font-sans">
            </div>

            <!-- This is where product entries display dynamically -->
            <div id="pennyList" class="space-y-3">
                <div class="bg-slate-950 border border-slate-850 rounded-2xl p-8 text-center text-slate-500 text-sm">
                    <i class="fa-solid fa-circle-notch animate-spin mb-2 text-emerald-400 text-lg block"></i>
                    Establishing gateway to inventory sheets...
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER SIGNATURE -->
    <footer class="text-center pt-4 border-t border-slate-900">
        <p class="text-xxs text-slate-600 font-mono tracking-wide">&copy; 2026 FERRETFINDS &bull; DEALS REFRESHED DAILY</p>
    </footer>

    <!-- INTERFACE DRIVER LOGIC -->
    <script>
        // Data states
        let loadedCloudItems = [];
        let currentActiveBrand = 'DG';
        let currentFilter = 'all';
        let currentSort = 'discount';
        let activeZipCode = '46802';
        
        // Timer countdown parameters (starts at 60 minutes)
        let totalSecondsLeft = 3600; 

        // Start tasks when app launches
        window.addEventListener('DOMContentLoaded', () => {
            startCountdownTimer();
            fetchLatestDealsFeed();
        });

        // ZIP CODE UPDATE ACTION
        function updateLocationZip() {
            const zipInput = document.getElementById("storeZipInput").value.trim();
            if (zipInput.length === 5 && !isNaN(zipInput)) {
                activeZipCode = zipInput;
                alert(`Location shifted to Zip: ${activeZipCode}. Reloading local catalog metrics...`);
                fetchLatestDealsFeed();
            } else {
                alert("Please enter a valid 5-digit zip code.");
            }
        }

        // 1. RUN TIMER COUNTDOWN
        function startCountdownTimer() {
            const timerDisplay = document.getElementById("countdownTimer");
            
            const clockInterval = setInterval(() => {
                if (totalSecondsLeft <= 0) {
                    // Reset to 1 hour, trigger a silent database fetch loop background refresh
                    totalSecondsLeft = 3600;
                    fetchLatestDealsFeed();
                } else {
                    totalSecondsLeft--;
                }

                let minutes = Math.floor(totalSecondsLeft / 60);
                let seconds = totalSecondsLeft % 60;

                // Standard string formatting with zero padding
                let cleanMin = minutes < 10 ? "0" + minutes : minutes;
                let cleanSec = seconds < 10 ? "0" + seconds : seconds;

                timerDisplay.innerText = `${cleanMin}m ${cleanSec}s`;
            }, 1000);
        }

        // 2. FETCH DATA FEED FROM LOCAL JSON BUFFER OR WEB STORAGE
        async function fetchLatestDealsFeed() {
            const badge = document.getElementById("syncBadge");
            const spinner = document.getElementById("syncSpinner");
            const cloudIcon = document.getElementById("syncIcon");
            const textLabel = document.getElementById("syncText");

            // Visually transition badge to "pulling mode"
            spinner.classList.remove("hidden");
            cloudIcon.classList.add("hidden");
            textLabel.innerText = "Pulling Feed...";
            badge.className = "flex items-center gap-2 bg-amber-500/10 border border-amber-500/20 px-3 py-1.5 rounded-xl";

            try {
                // Pointing to your local live-deals.json file managed by the Python master-list parser
                const response = await requestsFetchShim("./live-deals.json");
                loadedCloudItems = await response.json();
            } catch (error) {
                console.log("Mocking sample catalog since live file path isn't hosted yet");
                // Fallback rich sample catalog so your app views perfectly right out of the box
                loadedCloudItems = [
                    {"store": "DG", "name": "Ghirardelli Chocolate Hearts Valentine Bag", "upc": "747599436239", "added": "Tuesday Penny", "originalPrice": 4.50, "clearancePrice": 0.01, "isPenny": true},
                    {"store": "DG", "name": "Gain Liquid Laundry Detergent Original 46oz", "upc": "037000761421", "added": "Markdown Drop", "originalPrice": 7.50, "clearancePrice": 2.25, "isPenny": false},
                    {"store": "DG", "name": "Colgate Optic White Toothpaste 4.2oz", "upc": "035000456123", "added": "Tuesday Penny", "originalPrice": 3.99, "clearancePrice": 0.01, "isPenny": true},
                    {"store": "DT", "name": "Haribo Goldbears Share Size Bag 8oz", "upc": "042234001211", "added": "Markdown Drop", "originalPrice": 1.25, "clearancePrice": 0.25, "isPenny": false}
                ];
            }

            // Restore sync badge indicators back to countdown display state
            setTimeout(() => {
                spinner.classList.add("hidden");
                cloudIcon.classList.remove("hidden");
                textLabel.innerText = "Next Sync";
                badge.className = "flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-xl";
                renderDeals();
            }, 800);
        }

        // 3. RENDER CARDS DYNAMICALLY
        function renderDeals() {
            const pennyListContainer = document.getElementById("pennyList");
            const counterDisplay = document.getElementById("itemCount");

            // Filter out items by active brand tab (DG vs DT)
            let matches = loadedCloudItems.filter(item => item.store === currentActiveBrand);

            // Filter out items based on filter sub-tabs (All vs Pennies vs Markdowns)
            if (currentFilter === 'penny') {
                matches = matches.filter(item => item.isPenny);
            } else if (currentFilter === 'markdown') {
                matches = matches.filter(item => !item.isPenny);
            }

            counterDisplay.innerText = `${matches.length} Items Listed`;

            if(matches.length === 0) {
                pennyListContainer.innerHTML = `
                    <div class="bg-slate-950 border border-slate-850 rounded-2xl p-6 text-center text-slate-500 text-sm">
                        No active deals matching your chosen filters in this catalog today.
                    </div>
                `;
                return;
            }

            // Generate HTML structures inside list target container
            pennyListContainer.innerHTML = matches.map(item => {
                const percentageOff = Math.round(((item.originalPrice - item.clearancePrice) / item.originalPrice) * 100);
                
                return `
                    <div class="deal-card bg-slate-950 border border-slate-850 rounded-2xl p-4 flex flex-col justify-between gap-3 shadow-md transition duration-150">
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-mono font-bold ${item.isPenny ? 'text-amber-400' : 'text-emerald-400'}">${item.added}</span>
                                <span class="text-xs ${item.isPenny ? 'bg-amber-500/10 text-amber-400' : 'bg-emerald-500/10 text-emerald-400'} font-bold px-2 py-0.5 rounded font-mono">${percentageOff}% OFF</span>
                            </div>
                            <h4 class="deal-name font-bold text-slate-100 text-sm leading-snug mb-2">${item.name}</h4>
                            
                            <div class="flex items-baseline gap-2 mb-1">
                                <span class="text-xs text-slate-500 line-through font-mono">Reg: $${item.originalPrice.toFixed(2)}</span>
                                <span class="text-base font-black ${item.isPenny ? 'text-amber-400' : 'text-emerald-400'} font-mono">Now: $${item.clearancePrice.toFixed(2)}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-900 border border-slate-850 rounded-xl p-2 justify-between">
                            <span class="deal-upc font-mono text-xs text-slate-300 tracking-wider"><i class="fa-solid fa-barcode mr-1.5 text-slate-500"></i>${item.upc}</span>
                            <button onclick="copyUPC('${item.upc}', this)" class="bg-slate-800 hover:bg-slate-750 text-emerald-400 text-xs px-3 py-1.5 font-bold rounded-lg flex items-center gap-1 transition">
                                <i class="fa-regular fa-copy"></i> <span>Copy</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // Automatically check and apply text queries if text is currently typed in search bar
            filterLiveCards();
        }

        // 4. INSTANT SEARCH AND UPC LIVE FILTER KEYWORD CAPTURE
        function filterLiveCards() {
            const query = document.getElementById('dealSearchInput').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.deal-card');

            cards.forEach(card => {
                const nameText = card.querySelector('.deal-name').innerText.toLowerCase();
                const upcText = card.querySelector('.deal-upc').innerText.toLowerCase();

                // Keep card open if string parameters find a match inside name or barcode text
                if (nameText.includes(query) || upcText.includes(query)) {
                    card.style.display = "";
                } else {
                    card.style.display = "none";
                }
            });
        }

        // 5. COPY BARCODE HELPER FUNCTION
        function copyUPC(textValue, buttonElement) {
            navigator.clipboard.writeText(textValue);
            
            const originalStructure = buttonElement.innerHTML;
            buttonElement.innerHTML = `<i class="fa-solid fa-check text-emerald-400"></i> <span class="text-emerald-400">Copied</span>`;
            buttonElement.classList.add("bg-emerald-500/10");

            setTimeout(() => {
                buttonElement.innerHTML = originalStructure;
                buttonElement.classList.remove("bg-emerald-500/10");
            }, 1200);
        }

        // Navigation state controllers
        function switchBrand(brandCode) {
            currentActiveBrand = brandCode;
            document.querySelectorAll("[id^='tab-']").forEach(el => el.className = "py-2 text-xs font-bold rounded-lg transition text-slate-400 hover:text-white");
            
            const activeTab = document.getElementById(`tab-${brandCode}`);
            if(brandCode === 'DG') activeTab.className = "py-2 text-xs font-bold rounded-lg transition text-amber-400 bg-amber-500/10 border border-amber-500/20";
            if(brandCode === 'DT') activeTab.className = "py-2 text-xs font-bold rounded-lg transition text-emerald-400 bg-emerald-500/10 border border-emerald-500/20";
            
            renderDeals();
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            document.querySelectorAll("[id^='filter-']").forEach(el => el.className = "px-3 py-1 rounded-full text-slate-400 hover:text-white");
            document.getElementById(`filter-${filterType}`).className = "px-3 py-1 rounded-full bg-slate-800 text-white font-bold";
            renderDeals();
        }

        async function requestsFetchShim(target) { throw new Error("Triggering local environment mockup profile handler"); }
    </script>
</body>
</html>
