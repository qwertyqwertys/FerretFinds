name: Hourly Deal Refresher

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to also trigger it manually with a button click

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Scraping Dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Scraper Script
      run: python update_deals.py

    - name: Commit and Push Updated live-deals.json
      run: |
        git config --global user.name "FerretFindsBot"
        git config --global user.email "bot@ferretfinds.pages.dev"
        git add live-deals.json
        git commit -m "Automated hourly inventory refresh" || exit 0
        git push
