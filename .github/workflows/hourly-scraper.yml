name: Hourly Scraper 

on:
  schedule:
    - cron: '0 * * * *' # Runs at the top of every hour
  workflow_dispatch: # Allows you to manually trigger it in the Actions tab

permissions:
  contents: write # REQUIRED: This allows the bot to push changes back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node hourly-scraper.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Updated to target the new data folder
          git add data/live-deals.json
          # Only commit if there are changes to avoid empty commits
          git commit -m "Update live-deals.json [skip ci]" || echo "No changes to commit"
          git push
